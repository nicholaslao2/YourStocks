<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trading Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root" class="app">

    <!-- Topbar -->
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true"></span>
        <div>
          <div style="font-weight:700">TradeLab</div>
          <div style="font-size:12px;color:var(--muted)">Realtime charts and orders</div>
        </div>
      </div>

      <div class="search" role="search">
        <input id="symbolSearch" placeholder="Search symbol e.g. BTCUSD, AAPL" aria-label="Search symbol" />
      </div>

      <div class="top-actions">
        <button id="toggleSidebar" class="icon-btn" title="Toggle watchlist">☰</button>
        <button id="toggleRight" class="icon-btn" title="Toggle order panel">≡</button>
        <button class="icon-btn" title="Profile">👤</button>
      </div>
    </header>

    <!-- Left sidebar watchlist -->
    <aside class="sidebar">
      <div class="watchlist-header">
        <div class="watchlist-title">Watchlist</div>
        <div class="watchlist-actions">
          <button id="addSymbolBtn" class="small-btn">+ Add</button>
        </div>
      </div>

      <div id="watchlist" class="watchlist" role="list"></div>
    </aside>

    <!-- Center chart area -->
    <main class="chart-area">
      <div class="chart-header">
        <div class="left">
          <div class="symbol" id="activeSymbol">—</div>
          <div class="meta" id="activeMeta">Select a symbol to view chart</div>
        </div>
        <div class="right">
          <div class="meta">Timeframe
            <select id="timeframe">
              <option>1m</option>
              <option>5m</option>
              <option selected>1h</option>
              <option>1D</option>
            </select>
          </div>
        </div>
      </div>

      <div class="chart-canvas" id="chartContainer">
        <canvas id="chartCanvas" width="1200" height="600"></canvas>
        <div class="floating-toolbar" id="chartTools">
          <button class="icon-btn" title="Crosshair">✚</button>
          <button class="icon-btn" title="Indicators">ƒ</button>
          <button class="icon-btn" title="Draw">✎</button>
        </div>
      </div>
    </main>

    <!-- Right panel orders -->
    <aside class="right-panel">
      <div class="order-panel">
        <div class="section">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-weight:700" id="orderSymbol">—</div>
            <div class="badge" id="orderPrice">—</div>
          </div>
        </div>

        <div class="section">
          <label>Side</label>
          <div style="display:flex;gap:8px">
            <button id="buyBtn" class="btn buy">Buy</button>
            <button id="sellBtn" class="btn sell">Sell</button>
          </div>
        </div>

        <div class="section">
          <label>Quantity</label>
          <input id="qty" type="number" min="0.0001" step="0.0001" value="1" />
        </div>

        <div class="section">
          <label>Order Type</label>
          <select id="orderType">
            <option>Market</option>
            <option>Limit</option>
          </select>
        </div>

        <div class="section">
          <button id="placeOrder" class="btn buy" style="width:100%">Place Order</button>
        </div>

        <div class="section">
          <div style="font-weight:700;margin-bottom:8px">Positions</div>
          <table class="table" id="positionsTable">
            <thead><tr><th>Symbol</th><th>Qty</th><th>Avg</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </aside>

    <!-- Status bar -->
    <footer class="status-bar">
      <div id="statusLeft">Connected • Mock feed</div>
      <div id="statusRight">Latency <span class="badge" id="latency">12ms</span></div>
    </footer>

    <!-- Toast -->
    <div id="toast" style="position:fixed;right:18px;bottom:18px;z-index:60;display:none;padding:12px;border-radius:8px;background:rgba(0,0,0,0.6);color:var(--text)"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
