<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YourStocks</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="sidebar">
    <h1 class="logo">YourStocks</h1>
    <nav>
      <button class="nav-btn" data-target="dashboard">Dashboard</button>
      <button class="nav-btn" data-target="portfolio">Portfolio</button>
      <button class="nav-btn" data-target="risk">Risk Profile</button>
      <button class="nav-btn" data-target="sim">Simulation</button>
      <button class="nav-btn logout-btn">Logout</button>
    </nav>
  </div>

  <div class="main">

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen active">
      <div class="auth-card glass">
        <h2>Welcome to YourStocks</h2>
        <p class="sub">Your entire portfolio, unified.</p>

        <input id="auth-username" placeholder="Username" />
        <input id="auth-password" type="password" placeholder="Password" />

        <button id="login-btn" class="primary">Log In</button>
        <button id="signup-btn" class="secondary">Create Account</button>

        <p id="auth-msg"></p>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="screen">
      <h2 class="section-title">Dashboard</h2>
      <div class="grid">
        <div class="glass card">
          <h3>Total Portfolio Value</h3>
          <p id="total-value" class="big-number">$0.00</p>
        </div>

        <div class="glass card">
          <h3>Simulated Cash</h3>
          <p id="sim-cash" class="big-number">$100,000.00</p>
        </div>

        <div class="glass card">
          <h3>Risk Profile</h3>
          <p id="risk-profile-display" class="big-number">Not Assessed</p>
        </div>
      </div>
    </div>

    <!-- PORTFOLIO -->
    <div id="portfolio" class="screen">
      <h2 class="section-title">Portfolio</h2>

      <div class="glass card">
        <form id="add-stock-form" class="inline-form">
          <input id="ticker-input" placeholder="Ticker (AAPL)" />
          <input id="quantity-input" type="number" min="1" value="1" />
          <button class="primary">Add</button>
        </form>

        <table class="data-table">
          <thead>
            <tr>
              <th>Ticker</th>
              <th>Qty</th>
              <th>Price</th>
              <th>Value</th>
              <th>Alert</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="portfolio-body"></tbody>
        </table>

        <div id="alerts-log" class="alerts-log"></div>
      </div>
    </div>

    <!-- RISK PROFILE -->
    <div id="risk" class="screen">
      <h2 class="section-title">Risk Profile</h2>

      <div class="glass card">
        <form id="risk-form">
          <select id="q1">
            <option value="">Investment Horizon</option>
            <option value="low">Short</option>
            <option value="medium">Medium</option>
            <option value="high">Long</option>
          </select>

          <select id="q2">
            <option value="">Reaction to Drop</option>
            <option value="low">Sell</option>
            <option value="medium">Hold</option>
            <option value="high">Buy More</option>
          </select>

          <select id="q3">
            <option value="">Volatility Comfort</option>
            <option value="low">Low</option>
            <option value="medium">Moderate</option>
            <option value="high">High</option>
          </select>

          <button class="primary">Analyse</button>
        </form>

        <p id="risk-result"></p>
      </div>
    </div>

    <!-- SIMULATION -->
    <div id="sim" class="screen">
      <h2 class="section-title">Simulation Trading</h2>

      <div class="glass card">
        <form id="sim-trade-form" class="inline-form">
          <input id="sim-ticker" placeholder="Ticker" />
          <input id="sim-quantity" type="number" min="1" value="1" />
          <select id="sim-side">
            <option value="buy">Buy</option>
            <option value="sell">Sell</option>
          </select>
          <button class="primary">Trade</button>
        </form>

        <table class="data-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Ticker</th>
              <th>Side</th>
              <th>Qty</th>
              <th>Price</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody id="sim-history-body"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
